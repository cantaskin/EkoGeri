services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recyclingdb
      POSTGRES_USER: recycling
      POSTGRES_PASSWORD: recycling123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recycling -d recyclingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recyclingdb
      SPRING_DATASOURCE_USERNAME: recycling
      SPRING_DATASOURCE_PASSWORD: recycling123
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure:5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
